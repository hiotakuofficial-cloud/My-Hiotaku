<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - Episode {{EPISODE}} ({{LANGUAGE}})</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            background: #000; 
            overflow: hidden;
            font-family: Arial, sans-serif;
            height: 100vh;
            width: 100vw;
        }
        
        iframe { 
            width: 100vw; 
            height: 100vh; 
            border: none;
            pointer-events: auto;
        }
        
        .debug {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 1000;
            max-width: 320px;
            border: 1px solid #333;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 999;
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #FF8C00;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            color: #FF8C00;
            font-weight: bold;
        }
        
        .error {
            color: #ff4444;
        }
        
        .success {
            color: #44ff44;
        }
    </style>
</head>
<body>
    <div class="debug" id="debug">
        <div>🎬 <strong>{{TYPE_EMOJI}} {{LANGUAGE}} Player</strong></div>
        <div>📺 <strong>Anime:</strong> {{TITLE}}</div>
        <div>🎯 <strong>Episode:</strong> {{EPISODE}}</div>
        <div>🌐 <strong>Stream:</strong> <span id="streamStatus">Loading...</span></div>
        <div>⚡ <strong>Status:</strong> <span id="playerStatus" class="status">Initializing...</span></div>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p><strong>Loading {{LANGUAGE}} Episode {{EPISODE}}...</strong></p>
        <p style="font-size: 11px; margin-top: 10px; opacity: 0.8;">
            Stream: {{STREAM_URL_SHORT}}...
        </p>
    </div>
    
    <iframe id="videoFrame" 
            src="{{STREAM_URL}}" 
            allowfullscreen 
            webkitallowfullscreen 
            mozallowfullscreen
            allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
            sandbox="allow-same-origin allow-scripts allow-forms allow-pointer-lock allow-top-navigation allow-presentation allow-popups">
    </iframe>
    
    <script>
        console.log("🎬 {{LANGUAGE}} Player Starting");
        console.log("📺 Anime: {{TITLE}}");
        console.log("🎯 Episode: {{EPISODE}}");
        console.log("🌐 Stream URL: {{STREAM_URL}}");
        console.log("🔧 Type: {{TYPE}}");
        
        const debug = document.getElementById('debug');
        const loading = document.getElementById('loading');
        const iframe = document.getElementById('videoFrame');
        const streamStatus = document.getElementById('streamStatus');
        const playerStatus = document.getElementById('playerStatus');
        
        // Update initial status
        streamStatus.textContent = '{{STREAM_URL_SHORT}}...';
        playerStatus.textContent = 'Loading iframe...';
        playerStatus.className = 'status';
        
        // Iframe load handler
        iframe.onload = function() {
            console.log("✅ {{LANGUAGE}} iframe loaded successfully");
            
            loading.style.display = 'none';
            streamStatus.textContent = '✅ Connected';
            streamStatus.className = 'success';
            playerStatus.textContent = '✅ Ready to play';
            playerStatus.className = 'success';
            
            // Notify Flutter app
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('playerReady', {
                    type: '{{TYPE}}',
                    episode: '{{EPISODE}}',
                    title: '{{TITLE}}',
                    streamUrl: '{{STREAM_URL}}'
                });
            }
        };
        
        // Iframe error handler
        iframe.onerror = function(error) {
            console.log("❌ {{LANGUAGE}} iframe failed to load:", error);
            
            loading.innerHTML = '<p style="color: #ff4444;"><strong>❌ Failed to load video</strong></p>';
            streamStatus.textContent = '❌ Failed';
            streamStatus.className = 'error';
            playerStatus.textContent = '❌ Error loading';
            playerStatus.className = 'error';
        };
        
        // Timeout warning after 15 seconds
        setTimeout(function() {
            if (loading.style.display !== 'none') {
                loading.innerHTML = '<p style="color: orange;"><strong>⚠️ Taking longer than expected...</strong></p>';
                playerStatus.textContent = '⚠️ Slow loading';
                playerStatus.className = 'status';
                console.log("⚠️ Loading timeout warning");
            }
        }, 15000);
        
        // Auto-hide debug panel after 30 seconds
        setTimeout(function() {
            if (debug.style.display !== 'none') {
                debug.style.opacity = '0.3';
                setTimeout(() => debug.style.display = 'none', 2000);
            }
        }, 30000);
        
        // Click debug to toggle visibility
        debug.addEventListener('click', function() {
            debug.style.opacity = debug.style.opacity === '0.3' ? '1' : '0.3';
        });
        
        // Log player ready
        console.log("🚀 {{LANGUAGE}} Player initialized and ready");
    </script>
</body>
</html>
